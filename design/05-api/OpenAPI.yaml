openapi: 3.0.3
info:
  title: 和悦医养服务平台 API
  version: 0.2.0
  description: 第一阶段 OA 基座、IAM、物资管理 REST API。
servers:
  - url: /api/v1
paths:
  /system/health:
    get:
      operationId: systemHealth
      summary: 服务健康检查
      tags: [System]
      responses:
        '200': { description: OK }
  /system/modules:
    get:
      operationId: systemModules
      summary: 模块清单
      tags: [System]
      responses:
        '200': { description: OK }
  /auth/login:
    post:
      operationId: login
      summary: 登录
      description: 匿名调用；AI 不允许调用。管理员初始密码为 1qaz@WSX，其他成员初始密码为 qwer1234。
      tags: [IAM]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string, format: password }
      responses:
        '200': { description: OK }
  /iam/users:
    get:
      operationId: listUsers
      summary: 用户列表
      tags: [IAM]
      responses:
        '200': { description: OK }
    post:
      operationId: createUser
      summary: 创建用户
      tags: [IAM]
      responses:
        '200': { description: OK }
  /iam/users/{userId}:
    get:
      operationId: getUser
      summary: 用户详情
      tags: [IAM]
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200': { description: OK }
    put:
      operationId: updateUser
      summary: 更新用户
      tags: [IAM]
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200': { description: OK }
  /iam/users/{userId}/status:
    put:
      operationId: updateUserStatus
      summary: 启用或禁用用户
      tags: [IAM]
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200': { description: OK }
  /iam/users/{userId}/roles:
    put:
      operationId: updateUserRoles
      summary: 分配用户角色
      tags: [IAM]
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200': { description: OK }
  /iam/users/{userId}/permission-overrides:
    put:
      operationId: updateUserPermissionOverrides
      summary: 用户单独授权或撤销
      tags: [IAM]
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200': { description: OK }
  /iam/roles:
    get:
      operationId: listRoles
      summary: 角色列表
      tags: [IAM]
      responses:
        '200': { description: OK }
    post:
      operationId: createRole
      summary: 创建角色
      tags: [IAM]
      responses:
        '200': { description: OK }
  /iam/permissions:
    get:
      operationId: listPermissions
      summary: 权限点列表
      tags: [IAM]
      responses:
        '200': { description: OK }
  /iam/me/permissions:
    get:
      operationId: currentUserPermissions
      summary: 当前用户有效权限
      tags: [IAM]
      responses:
        '200': { description: OK }
  /oa/process-definitions:
    get:
      operationId: listProcessDefinitions
      summary: OA 流程定义列表
      tags: [OA]
      responses:
        '200': { description: OK }
    post:
      operationId: createProcessDefinition
      summary: 创建 OA 流程定义
      tags: [OA]
      responses:
        '200': { description: OK }
  /oa/instances/inventory-inbound:
    post:
      operationId: startInventoryInboundProcess
      summary: 发起物资入库 OA
      tags: [OA]
      responses:
        '200': { description: OK }
  /oa/instances/inventory-outbound:
    post:
      operationId: startInventoryOutboundProcess
      summary: 发起物品领用
      tags: [OA]
      responses:
        '200': { description: OK }
  /oa/instances/reimbursement:
    post:
      operationId: startReimbursementProcess
      summary: 发起报销 OA
      tags: [OA]
      responses:
        '200': { description: OK }
  /oa/instances:
    get:
      operationId: listProcessInstances
      summary: OA 流程实例列表
      tags: [OA]
      responses:
        '200': { description: OK }
  /oa/instances/mine:
    get:
      operationId: listMyProcessInstances
      summary: 工作台本人发起流程
      description: 登录用户查看自己发起的 OA 流程；AI 不允许调用。
      tags: [OA]
      responses:
        '200': { description: OK }
  /oa/instances/claimable-materials/search:
    get:
      operationId: searchClaimableMaterials
      summary: 物品领用可选物资
      description: 按 warehouseId 对应仓库类型过滤可申领物资；AI 不允许调用。
      tags: [OA]
      parameters:
        - name: warehouseId
          in: query
          required: true
          schema: { type: integer, format: int64 }
        - name: keyword
          in: query
          required: false
          schema: { type: string }
      responses:
        '200': { description: OK }
  /oa/tasks/todo:
    get:
      operationId: listTodoTasks
      summary: 我的待办
      tags: [OA]
      responses:
        '200': { description: OK }
  /oa/tasks/{taskId}:
    get:
      operationId: getTaskDetail
      summary: 待办详情
      description: 当前可处理人查看 OA 申请内容；AI 不允许调用。
      tags: [OA]
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200': { description: OK }
  /oa/tasks/{taskId}/approve:
    post:
      operationId: approveTask
      summary: 审批通过
      tags: [OA]
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200': { description: OK }
  /oa/tasks/{taskId}/reject:
    post:
      operationId: rejectTask
      summary: 审批驳回
      tags: [OA]
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200': { description: OK }
  /oa/instances/{instanceId}/urge:
    post:
      operationId: urgeInstance
      summary: 催办流程
      tags: [OA]
      parameters:
        - $ref: '#/components/parameters/InstanceId'
      responses:
        '200': { description: OK }
  /oa/instances/{instanceId}/revoke:
    post:
      operationId: revokeInstance
      summary: 撤销本人发起流程
      description: 仅发起人可撤销运行中或待配置流程；撤销后待办取消，AI 不允许调用。
      tags: [OA]
      parameters:
        - $ref: '#/components/parameters/InstanceId'
      responses:
        '200': { description: OK }
  /inventory/warehouses:
    get:
      operationId: listWarehouses
      summary: 仓库列表
      tags: [Inventory]
      responses:
        '200': { description: OK }
    post:
      operationId: createWarehouse
      summary: 创建仓库
      tags: [Inventory]
      responses:
        '200': { description: OK }
  /inventory/items:
    get:
      operationId: listInventoryItems
      summary: 物资档案列表
      tags: [Inventory]
      responses:
        '200': { description: OK }
    post:
      operationId: createInventoryItem
      summary: 创建物资档案
      tags: [Inventory]
      responses:
        '200': { description: OK }
  /inventory/items/{itemId}:
    get:
      operationId: getInventoryItem
      summary: 物资档案详情
      description: 需要 inventory:item:read；AI 可只读调用。
      tags: [Inventory]
      parameters:
        - name: itemId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200': { description: OK }
    put:
      operationId: updateInventoryItem
      summary: 修改物资档案
      description: 需要 inventory:item:write；路径 itemId 为唯一修改目标，ID 不允许通过请求体修改；AI 不允许调用。
      tags: [Inventory]
      parameters:
        - name: itemId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200': { description: OK }
    delete:
      operationId: deleteInventoryItem
      summary: 删除物资档案
      description: 需要 inventory:item:write；有库存余额或库存流水/出入库历史引用时禁止删除；AI 不允许调用。
      tags: [Inventory]
      parameters:
        - name: itemId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200': { description: OK }
  /inventory/prices:
    get:
      operationId: listInventoryPrices
      summary: 价格记录列表
      tags: [Inventory]
      responses:
        '200': { description: OK }
  /inventory/items/{itemId}/prices:
    post:
      operationId: createInventoryPrice
      summary: 新增物资价格
      tags: [Inventory]
      parameters:
        - name: itemId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200': { description: OK }
  /inventory/stocks:
    get:
      operationId: listInventoryStocks
      summary: 库存查询
      description: 支持 keyword 参数按库存 ID、仓库编码/名称、物资编码/名称等模糊查询；AI 可只读调用。
      tags: [Inventory]
      parameters:
        - name: keyword
          in: query
          required: false
          schema: { type: string }
          description: 模糊查询关键字
      responses:
        '200': { description: OK }
    post:
      operationId: createInventoryStock
      summary: 新增库存
      description: 需要 inventory:stock:write；AI 不允许调用。库存 ID 由数据库或运行时序列自增生成。
      tags: [Inventory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [warehouseId, itemId, quantity]
              properties:
                warehouseId: { type: integer, format: int64 }
                itemId: { type: integer, format: int64 }
                quantity: { type: number }
      responses:
        '200': { description: OK }
  /inventory/stocks/adjust:
    post:
      operationId: adjustInventoryStock
      summary: 管理员调整库存
      description: 仅 SYSTEM_ADMIN 可调用；不经过 OA，必须生成 ADJUST 库存流水；AI 不允许调用。
      tags: [Inventory]
      responses:
        '200': { description: OK }
  /inventory/stock-summary:
    get:
      operationId: listInventoryStockSummary
      summary: 物资库总库存
      description: 按仓库 + 物资聚合所有入库人明细库存，不返回 ownerUserId；AI 可只读调用。
      tags: [Inventory]
      responses:
        '200': { description: OK }
  /inventory/stock-transactions:
    get:
      operationId: listStockTransactions
      summary: 库存流水
      description: 需要 inventory:stock:read；SYSTEM_ADMIN 返回全部流水，其他用户仅返回本人 operatorUserId 流水；AI 只允许只读调用。
      tags: [Inventory]
      responses:
        '200': { description: OK }
  /inventory/inbound-orders:
    get:
      operationId: listInboundOrders
      summary: 入库单列表
      tags: [Inventory]
      responses:
        '200': { description: OK }
  /inventory/outbound-orders:
    get:
      operationId: listOutboundOrders
      summary: 出库单列表
      tags: [Inventory]
      responses:
        '200': { description: OK }
  /inventory/reimbursements:
    get:
      operationId: listReimbursements
      summary: 报销记录列表
      tags: [Inventory]
      responses:
        '200': { description: OK }
components:
  parameters:
    UserId:
      name: userId
      in: path
      required: true
      schema: { type: integer, format: int64 }
    TaskId:
      name: taskId
      in: path
      required: true
      schema: { type: integer, format: int64 }
    InstanceId:
      name: instanceId
      in: path
      required: true
      schema: { type: integer, format: int64 }
