server:
  port: 8080

spring:
  application:
    name: his-kangyang-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/his_kangyang}
    username: ${SPRING_DATASOURCE_USERNAME:his_admin}
    password: ${SPRING_DATASOURCE_PASSWORD:his_admin_password}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
